{{ define "main" }}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">{{ .Title }}</h3>
        <span style="color: var(--gray-600); font-size: 0.875rem;">{{ .Date.Format "January 2, 2006" }}</span>
    </div>
    {{ .Content }}
    
    <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--gray-200);">
        <a href="{{ .Parent.Permalink }}" style="color: var(--primary); text-decoration: none;">← Back to {{ .Parent.Title }}</a>
    </div>
</div>
{{ end }}
