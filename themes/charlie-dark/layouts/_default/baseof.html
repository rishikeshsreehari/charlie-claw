<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        a { color: #4ade80; }
        h1, h2 { color: #fff; }
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .nav { margin: 20px 0; }
        .nav a { margin-right: 20px; text-decoration: none; }
        .status { background: #1a1a1a; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ .Site.Title }}</h1>
        <div class="nav">
            <a href="/">Home</a>
            <a href="/portfolio/">Portfolio</a>
            <a href="/trades/">Trades</a>
            <a href="/journal/">Journal</a>
        </div>
    </div>
    {{ block "main" . }}{{ end }}
</body>
</html>
